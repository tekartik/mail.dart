name: tekartik_mail_aws_ses
description: Email using AWS SES v2 signed with aws_signature_v4
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

# Add regular dependencies here.
dependencies:
  tekartik_mail:
    git:
      url: https://github.com/tekartik/mail.dart
      path: packages/mail
    version: '>=0.1.1'
  aws_signature_v4: ">=0.6.10"
  aws_common: ">=0.7.12"

dev_dependencies:
  lints: ">=6.1.0"
  tekartik_lints:
    git:
      url: https://github.com/tekartik/common.dart
      path: packages/lints
  test: ">=1.31.0"

resolution: workspace
